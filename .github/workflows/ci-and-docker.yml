name: FlexMart Monorepo CI & Docker Build

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'client/**'
      - 'server/**'
      - 'package.json'
      - 'package-lock.json'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'client/**'
      - 'server/**'
      - 'package.json'
      - 'package-lock.json'

permissions:
  contents: read       # allow reading repo
  packages: write      # needed to publish to GHCR
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: 18
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  frontend-ci:
    name: Frontend Lint & Test (optional — Vercel auto-deploys)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Cache frontend dependencies
        uses: actions/cache@v4
        with:
          path: client/node_modules
          key: ${{ runner.os }}-frontend-${{ hashFiles('client/package-lock.json') }}
      - name: Install frontend deps
        working-directory: ./client
        run: npm ci
      - name: Lint frontend
        working-directory: ./client
        run: npm run lint
      - name: Test frontend
        working-directory: ./client
        run: npm test

  backend-ci:
    name: Backend Lint Test Build
    runs-on: ubuntu-latest
    needs: frontend-ci
    steps:
      - uses: actions/checkout@v4
      - name: Use Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Cache backend node_modules
        uses: actions/cache@v4
        with:
          path: server/node_modules
          key: ${{ runner.os }}-backend-${{ hashFiles('server/package-lock.json') }}
      - name: Install backend deps
        working-directory: ./server
        run: npm ci
      - name: Lint backend
        working-directory: ./server
        run: npm run lint
      - name: Test backend
        working-directory: ./server
        run: npm test
      - name: Build backend
        working-directory: ./server
        run: npm run build
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-dist
          path: server/dist

  build-and-push-image:
    name: Build & Push Docker image to GHCR
    runs-on: ubuntu-latest
    needs: [backend-ci]
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ./server
          file: ./server/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64
